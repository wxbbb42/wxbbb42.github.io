<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaoben Wang</title>
  <meta name="description" content="Designer who builds. Senior Product Designer at Microsoft." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Custom cursor: X → crosshair -->
  <div class="cursor" aria-hidden="true">
    <div class="cursor-inner">
      <div class="cursor-center"></div>
      <div class="cursor-arm h left"></div>
      <div class="cursor-arm h right"></div>
      <div class="cursor-arm v top"></div>
      <div class="cursor-arm v bottom"></div>
    </div>
    <div class="cursor-label" id="cursor-label"></div>
  </div>

  <!-- LEFT SIDEBAR NAV -->
  <nav class="nav">
    <a class="nav-logo" href="#">XW</a>
    <div class="nav-items">
      <button class="nav-btn active" data-section="0">
        <span class="nav-num">01</span>
        <span class="nav-label">Work</span>
      </button>
      <button class="nav-btn" data-section="1">
        <span class="nav-num">02</span>
        <span class="nav-label">AI Lab</span>
      </button>
      <button class="nav-btn" data-section="2">
        <span class="nav-num">03</span>
        <span class="nav-label">About</span>
      </button>
    </div>
    <div class="nav-line"><div class="nav-line-fill"></div></div>
  </nav>

  <!-- Background dot-grid canvas -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- SCROLL TRACK -->
  <div class="scroll-track">

    <!-- ── SECTION 0: WORK ── -->
    <div class="scene" id="scene-0">
      <div class="scene-sticky">
        <div class="scene-content">
          <header class="scene-header">
            <p class="scene-eyebrow">Selected Projects</p>
            <h2 class="scene-title">Things<br/><em>I've built</em></h2>
          </header>
          <div class="cards-grid" id="work-grid"></div>
        </div>
      </div>
    </div>

    <!-- ── SECTION 1: AI LAB ── -->
    <div class="scene" id="scene-1">
      <div class="scene-sticky">
        <div class="scene-content">
          <header class="scene-header">
            <p class="scene-eyebrow">AI Lab</p>
            <h2 class="scene-title">Agent<br/><em>Experiments</em></h2>
            <p class="scene-note">Maintained by my AI agent.</p>
          </header>
          <div class="lab-grid" id="lab-grid"></div>
        </div>
      </div>
    </div>

    <!-- ── SECTION 2: ABOUT ── -->
    <div class="scene" id="scene-2">
      <div class="scene-sticky">
        <div class="scene-content about-layout">
          <div class="about-left">
            <p class="scene-eyebrow">About</p>
            <h1 class="about-name scene-title">Xiaoben<br/><em>Wang</em></h1>
            <p class="about-tagline">Designer who builds.</p>
          </div>
          <div class="about-right">
            <p class="about-bio" id="bio-text"></p>
            <p class="about-loc" id="about-location"></p>
            <div class="about-links" id="about-links"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /scroll-track -->

  <!-- FOOTER STRIP -->
  <footer class="footer">
    <span>© 2025 Xiaoben Wang</span>
    <span>Maintained by <a href="https://github.com/openclaw/openclaw" target="_blank" rel="noopener">an AI agent</a></span>
  </footer>

  <!-- LIBRARIES -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
