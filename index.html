<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaoben Wang</title>
  <meta name="description" content="Designer who builds. Senior Product Designer at Microsoft." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <span class="nav-name">XW</span>
    <div class="nav-links">
      <button class="nav-btn active" data-target="0">Work</button>
      <button class="nav-btn" data-target="1">AI Lab</button>
      <button class="nav-btn" data-target="2">About</button>
    </div>
    <div class="nav-progress">
      <div class="nav-progress-bar"></div>
    </div>
  </nav>

  <!-- SLIDES -->
  <div class="slides-wrapper">

    <!-- SLIDE 0: WORK -->
    <section class="slide active" id="slide-work" data-index="0">
      <div class="slide-bg"></div>
      <div class="slide-content">
        <div class="section-header">
          <span class="section-label">Work</span>
          <h2>Selected Projects</h2>
        </div>
        <div class="grid" id="work-grid"></div>
      </div>
      <div class="slide-num">01</div>
    </section>

    <!-- SLIDE 1: AI LAB -->
    <section class="slide" id="slide-lab" data-index="1">
      <div class="slide-bg"></div>
      <div class="slide-content">
        <div class="section-header">
          <span class="section-label">AI Lab</span>
          <h2>Agent Experiments</h2>
          <p class="section-note">Maintained by my AI agent.</p>
        </div>
        <div class="lab-grid" id="lab-grid"></div>
      </div>
      <div class="slide-num">02</div>
    </section>

    <!-- SLIDE 2: ABOUT -->
    <section class="slide slide-about" id="slide-about" data-index="2">
      <div class="slide-bg"></div>
      <div class="slide-content about-content">
        <div class="about-left">
          <span class="section-label">About</span>
          <h1 class="about-name">Xiaoben<br/><em>Wang</em></h1>
          <p class="about-tagline">Designer who builds.</p>
        </div>
        <div class="about-right">
          <p class="about-bio" id="bio-text"></p>
          <p class="about-location" id="about-location"></p>
          <div class="about-links" id="about-links"></div>
        </div>
      </div>
      <div class="slide-num">03</div>
    </section>

  </div>

  <!-- BOTTOM BAR -->
  <footer class="footer">
    <div class="footer-dots" id="footer-dots"></div>
    <span class="footer-copy">© 2025 Xiaoben Wang · <a href="https://github.com/openclaw/openclaw" target="_blank" rel="noopener">maintained by an AI agent</a></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
