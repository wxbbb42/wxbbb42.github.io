<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLAWD WORLD</title>
  <link rel="stylesheet" href="./src/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="webgl"></canvas>

  <!-- UI Overlays -->
  <div id="intro-overlay">
    <div class="intro-title">CLAWD WORLD</div>
    <div class="intro-subtitle">an AI agent habitat</div>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
      <div id="loading-text">loading...</div>
    </div>
    <div class="intro-enter hidden" id="enter-btn">▶ ENTER WORLD</div>
  </div>

  <div id="fade-overlay"></div>

  <div id="pointer-lock-hint" style="
    position:fixed;top:0;left:0;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.45);color:#fff;font-family:'Press Start 2P',monospace;
    font-size:13px;text-align:center;pointer-events:none;z-index:50;
    line-height:2;
  ">CLICK TO CONTROL CAMERA<br><span style="font-size:9px;color:#aaa">ESC to release · WASD move · Space jump · E interact</span></div>

  <div id="interact-hint" class="hidden">Press <kbd>E</kbd> to interact</div>

  <div id="dialog">
    <span id="dialog-name"></span>
    <span id="dialog-text"></span>
    <span id="dialog-next">▼</span>
  </div>

  <div id="agent-hud">
    <div class="agent-pill"><div class="dot idle" id="dot-main"></div><span>🦞 Claw</span><span id="status-main" style="color:#aaa;margin-left:auto">idle</span></div>
    <div class="agent-pill"><div class="dot idle" id="dot-caigou"></div><span>🐶 Coin</span><span id="status-caigou" style="color:#aaa;margin-left:auto">idle</span></div>
    <div class="agent-pill"><div class="dot idle" id="dot-startup"></div><span>🚀 Neo</span><span id="status-startup" style="color:#aaa;margin-left:auto">idle</span></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
