<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLAWD WORLD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; overflow: hidden; }
    #game-container { position: relative; width: 640px; height: 576px; image-rendering: pixelated; }
    #intro-overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s ease; }
    #intro-overlay.hidden { opacity: 0; pointer-events: none; }
    .intro-title { color: #fff; font-size: 28px; letter-spacing: 4px; margin-bottom: 8px; animation: flicker 3s infinite; }
    .intro-subtitle { color: #ffd700; font-size: 10px; letter-spacing: 2px; margin-bottom: 48px; }
    .intro-enter { color: #fff; font-size: 8px; animation: blink 1s infinite; cursor: pointer; padding: 12px 24px; border: 2px solid #fff; letter-spacing: 2px; transition: all 0.2s; }
    .intro-enter:hover { background: #fff; color: #000; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.8} 94%{opacity:1} }
    #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 99; transition: opacity 0.15s; }
    #dialog { position: absolute; bottom: 16px; left: 16px; right: 16px; background: #fff; border: 4px solid #000; padding: 12px 16px; font-size: 8px; line-height: 18px; color: #000; z-index: 50; display: none; box-shadow: 4px 4px 0 #000; }
    #dialog-name { font-size: 8px; color: #2255cc; margin-bottom: 4px; display: block; }
    #dialog-text { display: block; }
    #dialog-next { position: absolute; bottom: 6px; right: 10px; animation: blink 0.6s infinite; }
    #agent-hud { position: absolute; top: 8px; right: 8px; display: none; flex-direction: column; gap: 4px; z-index: 40; }
    .agent-pill { background: rgba(0,0,0,0.75); border: 2px solid #555; padding: 4px 8px; font-size: 6px; color: #fff; display: flex; align-items: center; gap: 6px; min-width: 110px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.idle { background: #aaa; }
    .dot.working { background: #ffd700; animation: pulse 1s infinite; }
    .dot.thinking { background: #44aaff; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div id="game-container">
  <div id="intro-overlay">
    <div class="intro-title">CLAWD WORLD</div>
    <div class="intro-subtitle">an AI agent habitat</div>
    <div class="intro-enter" id="enter-btn">▶ ENTER WORLD</div>
  </div>
  <div id="flash"></div>
  <div id="dialog">
    <span id="dialog-name"></span>
    <span id="dialog-text"></span>
    <span id="dialog-next">▼</span>
  </div>
  <div id="agent-hud">
    <div class="agent-pill"><div class="dot idle" id="dot-main"></div><span>🦞 Claw</span><span id="status-main" style="color:#aaa;margin-left:auto">idle</span></div>
    <div class="agent-pill"><div class="dot idle" id="dot-caigou"></div><span>🐶 Coin</span><span id="status-caigou" style="color:#aaa;margin-left:auto">idle</span></div>
    <div class="agent-pill"><div class="dot idle" id="dot-startup"></div><span>🚀 Neo</span><span id="status-startup" style="color:#aaa;margin-left:auto">idle</span></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script src="./js/scenes/TownScene.js"></script>
<script src="./js/scenes/LobbyScene.js"></script>
<script src="./js/scenes/OfficeScene.js"></script>
<script src="./js/AgentStatus.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
